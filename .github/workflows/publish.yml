name: Publish

on:
  push:
    tags:
      - "releases/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: storybook-static

  build-library:
    name: Build Library
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Library
        run: pnpm build

      - name: Upload Library artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: dist
          if-no-files-found: error

  publish-library:
    name: Publish Library
    runs-on: ubuntu-latest
    needs:
      - build-storybook
      - build-library
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@dzign-studio"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: pnpm version "${GITHUB_REF_NAME#releases/v}" --no-git-tag-version --allow-same-version

      - name: Download Library artifact
        uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: dist

      - name: Publish Library
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-patch-version:
    name: Bump Patch Version
    runs-on: ubuntu-latest
    needs: publish-library
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Bump patch version
        run: |
          pnpm version "${GITHUB_REF_NAME#releases/v}" --no-git-tag-version --allow-same-version
          pnpm version patch --no-git-tag-version

      - name: Commit patch version
        run: |
          if git diff --quiet package.json; then
            echo "package.json already bumped after ${GITHUB_REF_NAME#releases/v}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump patch version"
          git push

  publish-storybook:
    name: Publish Storybook
    runs-on: ubuntu-latest
    needs: bump-patch-version
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Publish Storybook
        id: deployment
        uses: actions/deploy-pages@v4
